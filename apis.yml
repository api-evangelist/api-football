aid: api-football
name: API Football
description: >-
  API-Football is a RESTful API providing comprehensive football (soccer) data
  covering 1,200+ leagues and cups worldwide. Operated by API-Sports, the
  platform delivers live scores, fixtures, standings, events, line-ups, player
  statistics, pre-match odds, and historical data. The API supports 9+ sports
  total including soccer, Formula 1, basketball, baseball, hockey, rugby,
  volleyball, and handball. Data is returned in JSON format and updates every
  15 seconds during live matches.
